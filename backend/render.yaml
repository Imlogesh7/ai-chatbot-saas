services:
  - type: web
    name: ai-chatbot-backend
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_EXPIRATION
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: ai-chatbot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ai-chatbot-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://frontend-ten-hazel-61.vercel.app

databases:
  - name: ai-chatbot-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []

  - name: ai-chatbot-redis
    type: redis
    plan: free
    region: oregon
    maxmemoryPolicy: noeviction
